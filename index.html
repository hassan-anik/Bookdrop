<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BookDrop - Share Books Locally</title>
    <script>
      // Guard for window.fetch to prevent TypeError when libraries try to polyfill it
      // in an environment where it's a read-only property.
      (function() {
        if (typeof window !== 'undefined' && window.fetch) {
          try {
            var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
            if (descriptor && descriptor.configurable === false) {
              console.warn('window.fetch is not configurable, skipping guard.');
            } else {
              var originalFetch = window.fetch;
              Object.defineProperty(window, 'fetch', {
                get: function() { return originalFetch; },
                set: function(v) { 
                  console.warn('Prevented library from overwriting window.fetch.');
                },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e) {
            console.warn('Could not apply window.fetch guard in index.html.', e);
          }
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
