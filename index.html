    <!-- Structured Data (JSON-LD) for AI Search & Google -->
    <script type="application/ld+json">
    [
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "BookDrop",
        "url": "https://bookndrop.org/",
        "description": "A local neighborhood book sharing application. Discover, borrow, and share books with people in your community.",
        "applicationCategory": "LifestyleApplication",
        "genre": "Books & Reference",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "USD"
        },
        "featureList": [
          "Local book discovery",
          "Free book sharing",
          "Neighborhood library map",
          "Direct messaging for book exchange"
        ]
      },
      {
        "@context": "https://schema.org",
        "@type": "FAQPage",
        "mainEntity": [
          {
            "@type": "Question",
            "name": "Is BookDrop really free?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "Yes! BookDrop is a community-driven passion project. There are no fees to list, borrow, or swap books."
            }
          },
          {
            "@type": "Question",
            "name": "How do I exchange books safely?",
            "acceptedAnswer": {
              "@type": "Answer",
              "text": "We recommend meeting in public, well-lit spaces like local cafes or parks and using our built-in chat to coordinate."
            }
          }
        ]
      }
    ]
    </script>

    <script>
      // Guard for window.fetch to prevent TypeError when libraries try to polyfill it
      // in an environment where it's a read-only property.
      (function() {
        if (typeof window !== 'undefined' && window.fetch) {
          try {
            var descriptor = Object.getOwnPropertyDescriptor(window, 'fetch');
            if (descriptor && descriptor.configurable === false) {
              console.warn('window.fetch is not configurable, skipping guard.');
            } else {
              var originalFetch = window.fetch;
              Object.defineProperty(window, 'fetch', {
                get: function() { return originalFetch; },
                set: function(v) { 
                  console.warn('Prevented library from overwriting window.fetch.');
                },
                configurable: true,
                enumerable: true
              });
            }
          } catch (e) {
            console.warn('Could not apply window.fetch guard in index.html.', e);
          }
        }
      })();
    </script>
